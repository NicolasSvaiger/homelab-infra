services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle

    restart: unless-stopped

    environment:
      TZ: America/Sao_Paulo

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - proxy

    labels:
      - "homelab=true"
      - "category=monitoring"
      - "service=dozzle"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  proxy:
    external: true

