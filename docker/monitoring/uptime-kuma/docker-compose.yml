services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped

    environment:
      TZ: America/Sao_Paulo

    volumes:
      - ./data:/app/data

    networks:
      - proxy

    labels:
      - "homelab=true"
      - "category=monitoring"
      - "service=uptime-kuma"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  proxy:
    external: true

