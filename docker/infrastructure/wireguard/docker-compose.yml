services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy@sha256:5f26407fd2ede54df76d63304ef184576a6c1bb73f934a58a11abdd852fab549
    container_name: wg-easy
    networks:
      - default
      - prox

    environment:
      - LANG=pt_BR
      - WG_HOST=18.229.244.209
      - PASSWORD_HASH=$$2a$$12$$dktgrmIhYh32YEWFcjJZTe79GWf4TRZHR5NutsidxecVWFUv0qe0q

    volumes:
      - ./data:/etc/wireguard

    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1

    restart: unless-stopped

    networks:
      proxy:
        external: true
